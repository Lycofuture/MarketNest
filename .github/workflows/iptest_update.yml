# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: iptest_update

on:
  workflow_dispatch:

permissions:
  contents: write
  discussions: write

jobs:

  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: build 
      run: |
        cd iptest
        npm i
        node  convert.js init.csv ./ipfofa
        rm -rf node_modules detected_ip.csv extraction_ip.txt locations.json
        tar --no-recursion -czvf iptest.tar.gz *

    - name: Release
      uses: softprops/action-gh-release@v2
      with:
          name: iptest工具
          files: iptest/iptest.tar.gz
          tag_name: v.iptest
          append_body: false
          generate_release_notes: true
          
    - run: |
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add iptest/init.csv
        if ! git diff --cached --quiet; then
          git commit -m "csv update"
          git push
        fi
